name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundles
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Validate generated manifests
        run: npm run check:manifests

      - name: Validate permission snapshot
        run: npm run check:permissions
