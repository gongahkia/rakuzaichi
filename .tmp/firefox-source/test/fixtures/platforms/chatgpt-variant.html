<!DOCTYPE html>
<html lang="en">
<head><title>ChatGPT Variant</title></head>
<body>
  <button aria-label="Model"><span>GPT-4o</span></button>
  <main>
    <div class="ConversationColumn">
      <div class="min-h-8 text-message" id="chatgpt-variant-user" aria-label="User message">
        Draft a release note.
      </div>
      <div class="min-h-8 text-message" id="chatgpt-variant-assistant" aria-label="Assistant response">
        Here is a release note draft.
      </div>
    </div>
  </main>
</body>
</html>
