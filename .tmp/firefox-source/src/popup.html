<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rakuzaichi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <img src="./icon/128.png" alt="Rakuzaichi Logo" class="logo">
      <h2>Rakuzaichi</h2>
    </header>
    <section>
      <h3>Select Export Format</h3>
      <div class="format-grid">
        <button data-format="csv">CSV</button>
        <button data-format="tsv">TSV</button>
        <button data-format="json">JSON</button>
        <button data-format="ndjson">NDJSON</button>
        <button data-format="xml">XML</button>
        <button data-format="yaml">YAML</button>
      </div>
    </section>
    <div id="export-preview" class="hidden">
      <div class="preview-box">
        <p id="preview-info"></p>
        <div class="preview-actions">
          <button id="preview-confirm" class="btn-confirm">Download</button>
          <button id="preview-cancel" class="btn-cancel">Cancel</button>
        </div>
      </div>
    </div>
    <div id="status" class="status hidden"></div>
    <p class="privacy-note">Exports stay local to this browser and open the browser save flow.</p>
  </div>
  <script src="compat.js"></script>
  <script src="converters.js"></script>
  <script src="filename.js"></script>
  <script src="history.js"></script>
  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
